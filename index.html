  function parseM3U(content, sourceName = "Playlist") {
    const lines = content.split(/\r?\n/);
    let channelsArray = [];
    let currentExtInf = null;
    
    for (let i = 0; i < lines.length; i++) {
      let line = lines[i].trim();
      if (line.startsWith("#EXTINF")) {
        let name = "", logo = "", group = "Uncategorized";
        const logoMatch = line.match(/tvg-logo="([^"]*)"/i);
        if (logoMatch) logo = logoMatch[1];
        const groupMatch = line.match(/group-title="([^"]*)"/i);
        if (groupMatch) group = groupMatch[1];
        let parts = line.split(",");
        if (parts.length > 1) name = parts.slice(1).join(",").trim();
        if (!name || name === "") name = "Channel";
        currentExtInf = { name, logo, group };
      }
      else if (line.startsWith("http") && currentExtInf) {
        channelsArray.push({
          name: currentExtInf.name,
          url: line,
          logo: currentExtInf.logo || "",
          group: currentExtInf.group || "Uncategorized"
        });
        currentExtInf = null;
      }
    }
    
    if (channelsArray.length === 0) { 
      showToast("No channels found in playlist", 2000); 
      return false;
    }
    
    const newGroups = {};
    channelsArray.forEach(ch => {
      let g = ch.group || "Default";
      if (!newGroups[g]) newGroups[g] = [];
      newGroups[g].push(ch);
    });
    
    groupsMap = newGroups;
    if (!groupsMap["All"]) {
      groupsMap["All"] = channelsArray;
    }
    
    updateGroupTabs();
    
    // Set first group
    const firstGroup = Object.keys(groupsMap)[0];
    if (firstGroup && groupsMap[firstGroup]) {
      filteredChannels = groupsMap[firstGroup];
      currentIndex = 0;
      playChannel(0);
    }
    
    renderChannelList();
    showToast(`✅ ${channelsArray.length} channels loaded`, 2500);
    saveToLocalStorage();
    return true;
  }

  function showToast(msg, duration = 2000) {
    const toast = document.getElementById("toastMsg");
    toast.innerText = msg;
    toast.style.opacity = "1";
    setTimeout(() => toast.style.opacity = "0", duration);
  }

  function saveToLocalStorage() {
    try {
      const saveData = { groupsMap, lastGroup: currentGroup, lastChannelIndex: currentIndex };
      localStorage.setItem("tpsoft_iptv_data", JSON.stringify(saveData));
    } catch(e) { }
  }

  function loadFromLocalStorage() {
    const raw = localStorage.getItem("tpsoft_iptv_data");
    if (!raw) {
      // First time - load the built-in M3U
      parseM3U(fullM3UContent, "Built-in Bangladesh Playlist");
      return false;
    }
    try {
      const data = JSON.parse(raw);
      if (data.groupsMap && Object.keys(data.groupsMap).length > 0) {
        groupsMap = data.groupsMap;
        currentGroup = data.lastGroup || Object.keys(groupsMap)[0];
        currentIndex = data.lastChannelIndex || 0;
        updateGroupTabsFromSaved();
        if (groupsMap[currentGroup]) filteredChannels = groupsMap[currentGroup];
        else filteredChannels = groupsMap[Object.keys(groupsMap)[0]];
        renderChannelList();
        if (filteredChannels.length && currentIndex < filteredChannels.length) playChannel(currentIndex);
        else if (filteredChannels.length) playChannel(0);
        showToast(`📀 Loaded saved data (${filteredChannels.length} channels)`, 2000);
        return true;
      } else {
        parseM3U(fullM3UContent, "Built-in Bangladesh Playlist");
        return false;
      }
    } catch(e) {
      parseM3U(fullM3UContent, "Built-in Bangladesh Playlist");
      return false;
    }
  }

  function updateGroupTabsFromSaved() {
    tabsDiv.innerHTML = "";
    const groups = Object.keys(groupsMap);
    if (groups.length === 0) return;
    groups.forEach(grp => {
      const btn = document.createElement("button");
      btn.innerText = grp.length > 22 ? grp.substr(0, 20) + ".." : grp;
      btn.onclick = () => {
        if (activeTabBtn) activeTabBtn.classList.remove("active-tab");
        btn.classList.add("active-tab");
        activeTabBtn = btn;
        currentGroup = grp;
        filteredChannels = groupsMap[grp] || [];
        if (filteredChannels.length) { currentIndex = 0; playChannel(0); }
        renderChannelList();
        document.getElementById("searchBox").value = "";
        saveToLocalStorage();
        onUserActivity();
      };
      tabsDiv.appendChild(btn);
    });
    for (let i = 0; i < tabsDiv.children.length; i++) {
      if (tabsDiv.children[i].innerText === currentGroup || (i === 0 && !activeTabBtn)) {
        tabsDiv.children[i].click();
        break;
      }
    }
  }

  function updateGroupTabs() {
    tabsDiv.innerHTML = "";
    const groups = Object.keys(groupsMap);
    if (groups.length === 0) return;
    groups.forEach(grp => {
      const btn = document.createElement("button");
      btn.innerText = grp.length > 22 ? grp.substr(0, 20) + ".." : grp;
      btn.onclick = () => {
        if (activeTabBtn) activeTabBtn.classList.remove("active-tab");
        btn.classList.add("active-tab");
        activeTabBtn = btn;
        currentGroup = grp;
        filteredChannels = groupsMap[grp] || [];
        if (filteredChannels.length) { currentIndex = 0; playChannel(0); }
        renderChannelList();
        document.getElementById("searchBox").value = "";
        saveToLocalStorage();
        onUserActivity();
      };
      tabsDiv.appendChild(btn);
    });
    if (tabsDiv.firstChild) { tabsDiv.firstChild.click(); activeTabBtn = tabsDiv.firstChild; }
    saveToLocalStorage();
  }

  function renderChannelList() {
    popupDiv.innerHTML = "";
    if (!filteredChannels.length) {
      popupDiv.innerHTML = "<div style='padding:20px'>No channels found</div>";
      return;
    }
    filteredChannels.forEach((c, idx) => {
      const div = document.createElement("div");
      div.className = "channel" + (idx === currentIndex ? " active" : "");
      const logoUrl = (c.logo && c.logo.startsWith("http")) ? c.logo : "https://via.placeholder.com/45?text=TV";
      div.innerHTML = `<img src="${logoUrl}" onerror="this.src='https://via.placeholder.com/45?text=TP'"><div style="flex:1;">${escapeHtml(c.name)}</div>`;
      div.onclick = () => { playChannel(idx); closeMenu(); onUserActivity(); };
      popupDiv.appendChild(div);
    });
  }

  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

  function playChannel(index) {
    if (!filteredChannels.length) return;
    if (index < 0) index = 0;
    if (index >= filteredChannels.length) index = filteredChannels.length - 1;
    currentIndex = index;
    const ch = filteredChannels[currentIndex];
    if (!ch || !ch.url) { showToast("Stream URL not available", 1200); return; }
    if (hls) hls.destroy();
    if (Hls.isSupported() && (ch.url.includes('.m3u8') || ch.url.includes('m3u8'))) {
      hls = new Hls({ enableWorker: true });
      hls.loadSource(ch.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e => console.log(e)));
    } else {
      video.src = ch.url;
      video.play().catch(e => showToast("Playback error", 1200));
    }
    renderChannelList();
    document.title = `${ch.name} - TPSoft IPTV`;
    showToast(`📺 ${ch.name}`, 1200);
    saveToLocalStorage();
    onUserActivity();
  }

  async function loadM3UUrl() {
    const url = document.getElementById("m3uUrl").value.trim();
    if (!url) { showToast("Enter playlist URL", 1500); return; }
    try {
      showToast("Fetching...");
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      parseM3U(text, url);
    } catch (e) { showToast("Failed: " + e.message, 2000); }
  }

  document.getElementById("fileInput").onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => parseM3U(ev.target.result, file.name);
    reader.readAsText(file);
  };

  async function xtreamLogin() {
    let server = document.getElementById("xt_server").value.trim();
    let user = document.getElementById("xt_user").value.trim();
    let pass = document.getElementById("xt_pass").value.trim();
    if (!server || !user || !pass) { showToast("All fields required", 1500); return; }
    if (!server.startsWith("http")) server = "http://" + server;
    try {
      const apiUrl = `${server}/player_api.php?username=${user}&password=${pass}&action=get_live_streams`;
      const response = await fetch(apiUrl);
      const data = await response.json();
      if (!Array.isArray(data) || data.length === 0) throw new Error("No streams");
      const channelsList = data.map(stream => ({ name: stream.name || "Channel", url: `${server}/live/${user}/${pass}/${stream.stream_id}.m3u8`, logo: stream.stream_icon || "", group: stream.category_name || "Xtream" }));
      const grpMap = {};
      channelsList.forEach(ch => { let g = ch.group; if (!grpMap[g]) grpMap[g] = []; grpMap[g].push(ch); });
      groupsMap = grpMap;
      if (!groupsMap["All"]) groupsMap["All"] = channelsList;
      updateGroupTabs();
      filteredChannels = groupsMap[Object.keys(groupsMap)[0]];
      currentIndex = 0;
      playChannel(0);
      renderChannelList();
      showToast(`Xtream: ${channelsList.length} channels`, 2000);
      saveToLocalStorage();
    } catch (err) { showToast("Xtream error: " + err.message, 2000); }
  }

  async function serverM3U() {
    let srv = document.getElementById("srv_url").value.trim();
    let user = document.getElementById("srv_user").value.trim();
    let pass = document.getElementById("srv_pass").value.trim();
    if (!srv || !user || !pass) { showToast("All fields required", 1500); return; }
    if (!srv.startsWith("http")) srv = "http://" + srv;
    const url = `${srv}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=m3u8`;
    try {
      showToast("Connecting...");
      const res = await fetch(url);
      if (!res.ok) throw new Error("Auth failed");
      const text = await res.text();
      parseM3U(text, "Server M3U");
    } catch (e) { showToast("Server error: " + e.message, 2000); }
  }

  window.clearSavedData = function () {
    if (confirm("Clear all saved data? This will reset to default playlist!")) {
      localStorage.removeItem("tpsoft_iptv_data");
      showToast("Data cleared! Reloading...", 1500);
      setTimeout(() => { location.reload(); }, 1500);
    }
  };

  window.nextChannel = () => { if (filteredChannels.length) { playChannel((currentIndex + 1) % filteredChannels.length); onUserActivity(); } };
  window.prevChannel = () => { if (filteredChannels.length) { playChannel((currentIndex - 1 + filteredChannels.length) % filteredChannels.length); onUserActivity(); } };
  window.togglePlay = () => { video.paused ? video.play().catch(e => {}) : video.pause(); onUserActivity(); };
  window.searchChannel = () => {
    const q = document.getElementById("searchBox").value.toLowerCase();
    if (!q.trim()) filteredChannels = groupsMap[currentGroup] || [];
    else filteredChannels = (groupsMap[currentGroup] || []).filter(c => c.name.toLowerCase().includes(q));
    renderChannelList();
    onUserActivity();
  };

  function showControls() {
    if (topBar) topBar.style.opacity = "1";
    if (tabsDiv) tabsDiv.style.opacity = "1";
    if (bottomControls) bottomControls.classList.add("visible");
    if (hideTimer) clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (topBar) topBar.style.opacity = "0";
        if (tabsDiv) tabsDiv.style.opacity = "0";
        if (bottomControls) bottomControls.classList.remove("visible");
      }
    }, 3000);
  }

  function onUserActivity() { showControls(); }

  function handleFullscreenChange() {
    const isFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement);
    if (isFullscreen) {
      if (topBar) topBar.style.opacity = "1";
      if (tabsDiv) tabsDiv.style.opacity = "1";
      if (bottomControls) bottomControls.classList.add("visible");
    } else { showControls(); }
  }

  document.addEventListener("fullscreenchange", handleFullscreenChange);
  document.addEventListener("webkitfullscreenchange", handleFullscreenChange);
  document.addEventListener("mousemove", onUserActivity);
  document.addEventListener("click", onUserActivity);
  document.addEventListener("keydown", onUserActivity);
  document.addEventListener("touchstart", onUserActivity);
  video.addEventListener("click", onUserActivity);
  video.addEventListener("play", onUserActivity);

  function openMenu() { leftPanel.classList.add("open"); onUserActivity(); }
  function closeMenuDrawer() { leftPanel.classList.remove("open"); onUserActivity(); }
  window.toggleMenu = function () { overlayDiv.classList.toggle("show"); if (overlayDiv.classList.contains("show")) renderChannelList(); onUserActivity(); };
  function closeMenu() { overlayDiv.classList.remove("show"); onUserActivity(); }

  document.getElementById("menuToggleBtn").onclick = () => { if (leftPanel.classList.contains("open")) closeMenuDrawer(); else openMenu(); onUserActivity(); };
  document.getElementById("closeDrawerBtn").onclick = closeMenuDrawer;
  document.getElementById("channelBtn").onclick = () => { toggleMenu(); onUserActivity(); };
  document.getElementById("closeOverlay").onclick = closeMenu;
  volumeSlider.addEventListener("input", () => { video.volume = volumeSlider.value / 100; onUserActivity(); });
  video.volume = 0.7; volumeSlider.value = 70;
  video.addEventListener("play", () => playPauseIcon.className = "fas fa-pause");
  video.addEventListener("pause", () => playPauseIcon.className = "fas fa-play");

  document.addEventListener("keydown", (e) => {
    onUserActivity();
    if (e.key === "ArrowRight") { nextChannel(); e.preventDefault(); }
    if (e.key === "ArrowLeft") { prevChannel(); e.preventDefault(); }
    if (e.key === "ArrowUp") { openMenu(); e.preventDefault(); }
    if (e.key === "Escape") { closeMenu(); closeMenuDrawer(); }
    if (e.key === "Enter" && overlayDiv.classList.contains("show")) { if (filteredChannels[currentIndex]) playChannel(currentIndex); closeMenu(); }
    if (e.key === " " || e.key === "Space") { togglePlay(); e.preventDefault(); }
  });

  // Initialize
  loadFromLocalStorage();
  setTimeout(showControls, 500);
</script>
</body>
</html>
